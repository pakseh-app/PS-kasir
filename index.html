<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KasirKu POS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">

        <div class="container">

            <span class="navbar-brand fw-bold">
                🛒 KasirKu POS
            </span>

            <span class="text-white">
                Dashboard
            </span>

        </div>

    </nav>

    <div class="container py-4">

        <div class="mb-4">

            <h2 class="fw-bold">
                Dashboard
            </h2>

            <p class="text-muted">
                Selamat datang di aplikasi KasirKu POS
            </p>

        </div>

        <div class="row g-4">

            <div class="col-md-3">

                <div class="card shadow-sm h-100 text-center">

                    <div class="card-body">

                        <h1>🛒</h1>

                        <h5>Transaksi</h5>

                        <a href="pages/transaksi.html" class="btn btn-primary w-100">
                            Buka
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm h-100 text-center">

                    <div class="card-body">

                        <h1>📦</h1>

                        <h5>Barang</h5>

                        <a href="pages/barang.html" class="btn btn-success w-100">
                            Buka
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm h-100 text-center">

                    <div class="card-body">

                        <h1>🏷️</h1>

                        <h5>Kategori</h5>

                        <a href="pages/kategori.html" class="btn btn-info w-100">
                            Buka
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm h-100 text-center">

                    <div class="card-body">

                        <h1>📈</h1>

                        <h5>Laporan</h5>

                        <a href="pages/laporan.html" class="btn btn-warning w-100">
                            Buka
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow-sm h-100 text-center">

                    <div class="card-body">

                        <h1>⚙️</h1>

                        <h5>Pengaturan</h5>

                        <a href="pages/setting.html" class="btn btn-secondary w-100">
                            Buka
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <hr class="my-5">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h6 class="text-muted">
                            Total Penjualan Hari Ini
                        </h6>

                        <h2 id="todaySales">
                            Rp0
                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h6 class="text-muted">
                            Jumlah Transaksi
                        </h6>

                        <h2 id="todayTransaction">
                            0
                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h6 class="text-muted">
                            Total Barang
                        </h6>

                        <h2 id="totalBarang">
                            0
                        </h2>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
