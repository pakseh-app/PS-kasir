<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Master Barang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="../index.html"
class="navbar-brand">

☕ KasirKu POS

</a>

</div>

</nav>

<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<h3>Master Barang</h3>

<hr>

<form id="barangForm">

<div class="row">

<div class="col-md-4">

<input
id="nama"
class="form-control"
placeholder="Nama Barang"
required>

</div>

<div class="col-md-3">

<input
id="harga"
type="number"
class="form-control"
placeholder="Harga"
required>

</div>

<div class="col-md-3">

<input
id="stok"
type="number"
class="form-control"
placeholder="Stok"
required>

</div>

<div class="col-md-2">

<button
class="btn btn-success w-100">

Simpan

</button>

</div>

</div>

</form>

<hr>

<table class="table table-bordered">

<thead>

<tr>

<th>No</th>

<th>Nama Barang</th>

<th>Harga</th>

<th>Stok</th>

</tr>

</thead>

<tbody id="barangTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script type="module" src="../assets/js/barang.js"></script>

</body>

</html>
