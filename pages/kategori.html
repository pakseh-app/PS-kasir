<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manajemen Kategori - KasirKu POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container">

<a
href="../index.html"
class="btn btn-outline-light">

🏠 Dashboard

</a>

<span class="navbar-brand mx-auto fw-bold">

🏷 Manajemen Kategori

</span>

</div>

</nav>

<div class="container py-4">

<div class="card shadow-sm mb-4">

<div class="card-body">

<h5 class="mb-3">

Tambah Kategori

</h5>

<div class="row g-2">

<div class="col-md-10">

<input
id="namaKategori"
type="text"
class="form-control"
placeholder="Masukkan nama kategori">

</div>

<div class="col-md-2">

<button
id="btnTambah"
class="btn btn-success w-100">

<i class="bi bi-plus-circle"></i>

Tambah

</button>

</div>

</div>

</div>

</div>

<div class="card shadow-sm">

<div class="card-body">

<h5 class="mb-3">

Daftar Kategori

</h5>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th width="60">No</th>

<th>Nama Kategori</th>

<th width="150">Aksi</th>

</tr>

</thead>

<tbody id="kategoriTable">

<tr>

<td colspan="3" class="text-center text-muted">

Belum ada kategori.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script type="module" src="../assets/js/kategori.js"></script>

</body>
</html>
