<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan - KasirKu POS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a
            href="../index.html"
            class="btn btn-outline-light">

            🏠 Dashboard

        </a>

        <span class="navbar-brand mx-auto fw-bold">

            📈 Laporan Penjualan

        </span>

    </div>

</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>📈 Laporan Penjualan</h3>

        <button
            class="btn btn-success"
            id="refreshBtn">
            Refresh
        </button>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Total Penjualan</h6>

                    <h3 id="totalPenjualan">
                        Rp0
                    </h3>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Jumlah Transaksi</h6>

                    <h3 id="jumlahTransaksi">
                        0
                    </h3>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Rata-rata Transaksi</h6>

                    <h3 id="rataTransaksi">
                        Rp0
                    </h3>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <h5>Riwayat Penjualan</h5>

            <hr>

            <div class="table-responsive">

                <table class="table table-striped">

                    <thead class="table-dark">

                        <tr>

                            <th>No</th>
                            <th>Tanggal</th>
                            <th>Total</th>
                            <th>Tunai</th>
                            <th>Kembalian</th>

                        </tr>

                    </thead>

                    <tbody id="laporanTable">

                        <tr>

                            <td colspan="5" class="text-center text-muted">

                                Belum ada transaksi.

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>
<script type="module" src="../assets/js/laporan.js"></script>

</body>
</html>
