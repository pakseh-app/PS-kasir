<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS-kasir - Preview Struk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#ececec;
    padding:30px;
    font-family:Arial,Helvetica,sans-serif;
}

#receipt{
    width:80mm;
    max-width:80mm;
    margin:auto;
    background:#fff;
    padding:4mm;
    color:#000;
    box-sizing:border-box;
    font-size:13px;
    line-height:1.4;
}

.center{
    text-align:center;
}

#logo{
    width:60px;
    margin-bottom:6px;
}

h4{
    margin:0;
    font-size:18px;
    font-weight:bold;
}

.small{
    font-size:12px;
}

hr{
    border:none;
    border-top:1px dashed #000;
    margin:6px 0;
    opacity:1;
}

.item{
    margin-bottom:7px;
}

.item-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
}

.item-left{
    flex:1;
    min-width:0;

    white-space:normal;
    overflow-wrap:anywhere;
    word-break:break-word;
}

.item-right{
    width:72px;
    text-align:right;
    white-space:nowrap;
    font-weight:bold;
    flex-shrink:0;
}

.total-row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    font-weight:bold;

    margin:4px 0;

}

.total-row span:last-child{

    width:80px;

    text-align:right;

}

button{
    margin-top:18px;
}

@media print{

    html,
    body{
        width:80mm;
        height:auto !important;
        margin:0;
        padding:0;
        overflow:visible !important;
        background:#fff;
    }

    #receipt{
        width:80mm;
        max-width:80mm;
        min-height:auto;
        margin:0 auto;
        padding:3mm;
        box-sizing:border-box;
        box-shadow:none;

        page-break-inside:avoid;
        break-inside:avoid;
    }

    .item,
    .item-row,
    .total-row{

        page-break-inside:avoid;
        break-inside:avoid;

    }

    #footerStruk{

        margin-top:10px;
        text-align:center;
        line-height:1.6;
        white-space:normal;
        word-break:break-word;

        page-break-inside:avoid;
        break-inside:avoid;

    }

    #printBtn{

        display:none;

    }

}

@page{

    size:80mm auto;
    margin:2mm;

}

</style>

</head>

<body>

<div id="receipt">

<div class="center">

<img
id="logo"
src="../assets/img/logo.png"
onerror="this.style.display='none'">

<h4 id="namaToko">
Pakseh
</h4>

<div
class="small"
id="alamat">
Alamat Toko
</div>

<div
class="small"
id="telepon">
-
</div>

</div>

<hr>

<div
class="small"
id="tanggal">
</div>

<hr>

<div id="items">
</div>

<hr>

<div class="total-row">
<span>Total</span>
<span id="total">Rp0</span>
</div>

<div class="total-row">
<span>Tunai</span>
<span id="tunai">Rp0</span>
</div>

<div class="total-row">
<span>Kembalian</span>
<span id="kembali">Rp0</span>
</div>

<hr>

<div
class="center small"
id="footerStruk">

========================

<br><br>

Terima kasih
<br>
telah berbelanja

<br><br>

Yang mau dibuatin
<br>
Aplikasi Kasir seperti ini lansung chat saja

<br><br>

WA
<br>
085156028912

<br><br>

Powered by.Pakseh

<br><br>

========================

</div>

<button
id="printBtn"
class="btn btn-success w-100">

🖨 Cetak Struk

</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script>

const items = JSON.parse(localStorage.getItem("keranjang")) || [];

const total = localStorage.getItem("total") || "Rp0";
const tunai = localStorage.getItem("tunai") || "Rp0";
const kembali = localStorage.getItem("kembali") || "Rp0";

const itemDiv = document.getElementById("items");

const now = new Date();

const tanggal = now.toLocaleDateString("id-ID",{
    day:"2-digit",
    month:"short",
    year:"numeric"
});

const jam = now.toLocaleTimeString("id-ID",{
    hour:"2-digit",
    minute:"2-digit"
});

document.getElementById("tanggal").innerHTML = `
${tanggal}
<br>
${jam} WIB
`;

items.forEach(item=>{

    itemDiv.innerHTML += `

    <div class="item">

    <div class="item-row">

        <div class="item-left">

            <b>${item.nama}</b><br>

            ${item.qty} × Rp ${item.harga.toLocaleString("id-ID")}

        </div>

        <div class="item-right">

            Rp ${(item.qty * item.harga).toLocaleString("id-ID")}

        </div>

    </div>

</div>

`;

});

document.getElementById("total").textContent = total;
document.getElementById("tunai").textContent = tunai;
document.getElementById("kembali").textContent = kembali;

// =======================
// LOAD SETTING TOKO
// =======================

const db = new Dexie("KasirKuDB");

db.version(1).stores({

    barang: "++id,nama,kategori,harga,stok",

    transaksi: "++id,tanggal,total,tunai,kembalian",

    detail: "++id,transaksiId,barangId",

    setting: "id"

});

db.setting.get(1).then(setting=>{

    if(!setting) return;

    document.getElementById("namaToko").textContent =
        setting.namaToko || "Pakseh";

    document.getElementById("alamat").textContent =
        setting.alamat || "-";

    document.getElementById("telepon").textContent =
        setting.telepon || "-";

    document.getElementById("footerStruk").innerHTML =
        setting.footer ||
        `Terima kasih telah berbelanja
        <br><br>
        Yang mau dibuatin aplikasi kasir
        <br>
        hubungi WA 085156028912
        <br><br>
        Powered by PS-kasir`;

});

document.getElementById("printBtn").addEventListener("click",()=>{

    window.print();

});

    </script>

</body>

</html>
