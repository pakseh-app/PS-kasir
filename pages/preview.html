<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Preview Struk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#eee;

padding:20px;

}

#receipt{

width:320px;

margin:auto;

background:white;

padding:20px;

font-family:monospace;

}

.center{

text-align:center;

}

hr{

border-top:dashed 1px black;

}

</style>

</head>

<body>

<div id="receipt">

<div class="center">

<img
id="logo"
src="../assets/img/logo.png"
width="80">

<h4 id="namaToko">

KasirKu POS

</h4>

<div id="alamat">

Alamat Toko

</div>

</div>

<hr>

<div id="items">

</div>

<hr>

<table width="100%">

<tr>

<td>Total</td>

<td align="right"
id="total">

Rp0

</td>

</tr>

<tr>

<td>Tunai</td>

<td align="right"
id="tunai">

Rp0

</td>

</tr>

<tr>

<td>Kembali</td>

<td align="right"
id="kembali">

Rp0

</td>

</tr>

</table>

<hr>

<div
class="center"
id="footer">

Terima kasih

</div>

</div>

<script>

const items=

JSON.parse(

localStorage.getItem("keranjang")

)||[];

const div=

document.getElementById("items");

items.forEach(x=>{

div.innerHTML+=`

<div>

${x.nama}

<br>

${x.qty} x Rp ${x.harga.toLocaleString()}

</div>

`;

});

document.getElementById("total").innerHTML=

localStorage.getItem("total");

document.getElementById("tunai").innerHTML=

localStorage.getItem("tunai");

document.getElementById("kembali").innerHTML=

localStorage.getItem("kembali");

</script>

</body>

</html>
