<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Preview Struk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#ececec;
    padding:30px;
    font-family:Arial, Helvetica, sans-serif;
}

#receipt{

    width:80mm;
    margin:auto;
    background:white;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);

}

.center{

    text-align:center;

}

#logo{

    width:70px;
    margin-bottom:10px;

}

h4{

    margin:0;

}

.small{

    font-size:13px;

}

hr{

    border-top:1px dashed #000;
    opacity:1;

}

.item{

    margin-bottom:8px;

}

.item-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    width:100%;
    gap:10px;
}

.item-left{
    flex:1;
    word-break:break-word;
}

.item-right{
    width:80px;
    text-align:right;
    white-space:nowrap;
}

.total-row{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}

.total-row span:last-child{
    text-align:right;
    min-width:90px;
}

.total-table{

    width:100%;

}

.total-table td{

    padding:3px 0;

}

button{

    margin-top:20px;

}

@media print{

    body{

    background:white;

    margin:0;
    padding:0;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    width:100%;
    min-height:100vh;

}

    #receipt{

    width:80mm;
    padding:5mm;
    margin:10mm auto;
    box-shadow:none;

}

    #printBtn{

        display:none;

    }

}

@page{

    size:auto;
    margin:0;

}

</style>

</head>

<body>

<div id="receipt">

<div class="center">

<img
id="logo"
src="../assets/img/logo.png"
onerror="this.style.display='none'">

<h4 id="namaToko">

KasirKu POS

</h4>

<div
class="small"
id="alamat">

Alamat Toko

</div>

<div
class="small"
id="telepon">

0812-3456-7890

</div>

</div>

<hr>

<div
class="small"
id="tanggal">

</div>

<hr>

<div id="items">

</div>

<hr>

<div class="total-row">

<span>Total</span>

<span id="total">Rp0</span>

</div>

<div class="total-row">

<span>Tunai</span>

<span id="tunai">Rp0</span>

</div>

<div class="total-row">

<span>Kembalian</span>

<span id="kembali">Rp0</span>

</div>

<hr>

<div class="center small">

Terima kasih 😊

<br>

Selamat Berbelanja

</div>

<button
id="printBtn"
class="btn btn-success w-100">

🖨 Cetak Struk

</button>

</div>

<script>

const items = JSON.parse(localStorage.getItem("keranjang")) || [];

const total = localStorage.getItem("total") || "Rp0";
const tunai = localStorage.getItem("tunai") || "Rp0";
const kembali = localStorage.getItem("kembali") || "Rp0";

const itemDiv = document.getElementById("items");

const now = new Date();

document.getElementById("tanggal").innerHTML =
`
Tanggal : ${now.toLocaleDateString("id-ID")}
<br>
Jam : ${now.toLocaleTimeString("id-ID")}
`;

items.forEach(item=>{

itemDiv.innerHTML += `

<div class="item">

    <div class="item-row">

        <div class="item-left">

            <b>${item.nama}</b><br>

            ${item.qty} × Rp ${item.harga.toLocaleString("id-ID")}

        </div>

        <div class="item-right">

            Rp ${(item.qty*item.harga).toLocaleString("id-ID")}

        </div>

    </div>

</div>

`;

});

document.getElementById("total").innerHTML = total;
document.getElementById("tunai").innerHTML = tunai;
document.getElementById("kembali").innerHTML = kembali;

document.getElementById("printBtn").addEventListener("click",()=>{

window.print();

});

window.onafterprint=()=>{

window.close();

};

</script>

</body>
</html>
