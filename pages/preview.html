<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS-kasir - Preview Struk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#ececec;
    padding:30px;
    font-family:Arial, Helvetica, sans-serif;
}

#receipt{
    width:80mm;
    max-width:80mm;
    margin:auto;
    background:#fff;
    padding:4mm;
    color:#000;
    font-size:13px;
    line-height:1.4;
    box-sizing:border-box;
}

.center{
    text-align:center;
}

#logo{
    width:60px;
    margin-bottom:6px;
}

h4{
    margin:0;
    font-size:18px;
    font-weight:bold;
}

.small{
    font-size:12px;
}

hr{
    border:none;
    border-top:1px dashed #000;
    margin:6px 0;
}

.item{
    margin-bottom:6px;
}

.item-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
}

.item-left{
    flex:1;
    min-width:0;
    word-break:break-word;
}

.item-right{
    width:70px;
    text-align:right;
    white-space:nowrap;
    flex-shrink:0;
}

.total-row{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin:3px 0;
}

.total-row span:last-child{
    width:80px;
    text-align:right;
}

button{
    margin-top:15px;
}
@media print{

    body{

        background:white;
        padding:0;
        margin:0;

    }

    #receipt{

        width:80mm;
        padding:5mm;
        margin:0;
        box-shadow:none;

    }

    #printBtn{

        display:none;

    }

}

@page{

    size:auto;
    margin:0;

}

</style>

</head>

<body>

<div id="receipt">

<div class="center">

<img
id="logo"
src="../assets/img/logo.png"
onerror="this.style.display='none'">

<h4 id="namaToko">
Pakseh
</h4>

<div
class="small"
id="alamat">

Alamat Toko

</div>

<div
class="small"
id="telepon">

0812-3456-7890

</div>

</div>

<hr>

<div
class="small"
id="tanggal">

</div>

<hr>

<div id="items">

</div>

<hr>

<div class="total-row">

<span>Total</span>

<span id="total">Rp0</span>

</div>

<div class="total-row">

<span>Tunai</span>

<span id="tunai">Rp0</span>

</div>

<div class="total-row">

<span>Kembalian</span>

<span id="kembali">Rp0</span>

</div>

<hr>

<div
class="center small"
id="footerStruk">

Terima kasih 😊

</div>

<button
id="printBtn"
class="btn btn-success w-100">

🖨 Cetak Struk

</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script>

const items = JSON.parse(localStorage.getItem("keranjang")) || [];

const total = localStorage.getItem("total") || "Rp0";
const tunai = localStorage.getItem("tunai") || "Rp0";
const kembali = localStorage.getItem("kembali") || "Rp0";

const itemDiv = document.getElementById("items");

const now = new Date();

document.getElementById("tanggal").innerHTML =
`
Tanggal : ${now.toLocaleDateString("id-ID")}
<br>
Jam : ${now.toLocaleTimeString("id-ID")}
`;

items.forEach(item=>{

itemDiv.innerHTML += `

<div class="item">

    <div class="item-row">

        <div class="item-left">

            <b>${item.nama}</b><br>

            ${item.qty} × Rp ${item.harga.toLocaleString("id-ID")}

        </div>

        <div class="item-right">

            Rp ${(item.qty*item.harga).toLocaleString("id-ID")}

        </div>

    </div>

</div>

`;

});

document.getElementById("total").innerHTML = total;
document.getElementById("tunai").innerHTML = tunai;
document.getElementById("kembali").innerHTML = kembali;

// =======================
// LOAD SETTING TOKO
// =======================

const db = new Dexie("KasirKuDB");

db.version(1).stores({

    barang: "++id,nama,kategori,harga,stok",

    transaksi: "++id,tanggal,total,tunai,kembalian",

    detail: "++id,transaksiId,barangId",

    setting: "id"

});

db.setting.get(1).then(setting=>{

    if(!setting) return;

    document.getElementById("namaToko").textContent =
    setting.namaToko;

document.getElementById("alamat").textContent =
    setting.alamat;

document.getElementById("telepon").textContent =
    setting.telepon;

document.getElementById("footerStruk").textContent =
    setting.footer;

});

document.getElementById("printBtn").addEventListener("click", () => {
    window.print();
});

</script>

</body>
</html>
