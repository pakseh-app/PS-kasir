<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengaturan - KasirKu POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:18px;
}

.section-title{
    font-weight:700;
    color:#555;
    margin-bottom:20px;
}

.form-control,
.form-select{
    border-radius:12px;
}

.btn{
    border-radius:12px;
}

.preview-card{
    background:#fff;
    border:2px dashed #ddd;
    border-radius:16px;
    padding:20px;
}

.preview-card h5{
    margin-bottom:5px;
    font-weight:bold;
}

.preview-card small{
    color:#777;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">

<div class="container">

<a href="../index.html" class="navbar-brand fw-bold">

☕ KasirKu POS

</a>

</div>

</nav>

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2 class="mb-1">
⚙ Pengaturan
</h2>

<p class="text-muted mb-0">
Konfigurasi aplikasi KasirKu POS
</p>

</div>

<a href="../index.html" class="btn btn-outline-secondary">

<i class="bi bi-arrow-left"></i>

Dashboard

</a>

</div>

<div class="row g-4">

<!-- KIRI -->

<div class="col-lg-7">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="section-title">

🏪 Identitas Toko

</h5>

<div class="mb-3">

<label class="form-label">

Nama Toko

</label>

<input
id="namaToko"
type="text"
class="form-control"
placeholder="Contoh : KasirKu Coffee">

</div>

<div class="mb-3">

<label class="form-label">

Alamat

</label>

<textarea
id="alamat"
class="form-control"
rows="3"
placeholder="Alamat lengkap toko"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Nomor Telepon

</label>

<input
id="telepon"
type="text"
class="form-control"
placeholder="08xxxxxxxxxx">

</div>

<div class="mb-3">

<label class="form-label">

Footer Struk

</label>

<input
id="footer"
type="text"
class="form-control"
placeholder="Terima kasih telah berbelanja 😊">

</div>

<hr>

<h5 class="section-title">

🖨 Pengaturan Struk

</h5>

<div class="form-check form-switch mb-2">

<input
class="form-check-input"
type="checkbox"
id="showAlamat"
checked>

<label class="form-check-label">

Tampilkan Alamat

</label>

</div>

<div class="form-check form-switch mb-2">

<input
class="form-check-input"
type="checkbox"
id="showTelepon"
checked>

<label class="form-check-label">

Tampilkan Telepon

</label>

</div>

<div class="form-check form-switch mb-4">

<input
class="form-check-input"
type="checkbox"
id="showTanggal"
checked>

<label class="form-check-label">

Tampilkan Tanggal & Jam

</label>

</div>

<div class="d-flex gap-2">

<button
id="saveBtn"
class="btn btn-success">

💾 Simpan

</button>

<button
id="resetBtn"
class="btn btn-warning">

🔄 Reset

</button>

</div>

</div>

</div>

</div>

<!-- KANAN -->

<div class="col-lg-5">

<div class="card shadow-sm mb-4">

<div class="card-body">

<h5 class="section-title">

👀 Preview Struk

</h5>

<div class="preview-card text-center">

<h5 id="previewNama">

KasirKu POS

</h5>

<div id="previewAlamat">

Alamat Toko

</div>

<div id="previewTelepon">

0812-3456-7890

</div>

<hr>

<small id="previewFooter">

Terima kasih 😊

</small>

</div>

</div>

</div>

<div class="card border-danger shadow-sm">

<div class="card-body">

<h5 class="text-danger">

⚠ Database

</h5>

<p class="text-muted">

Gunakan dengan hati-hati.

</p>

<button
id="hapusDataBtn"
class="btn btn-danger w-100">

🗑 Hapus Semua Data

</button>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>
<script type="module" src="../assets/js/setting.js"></script>

</body>
</html>
