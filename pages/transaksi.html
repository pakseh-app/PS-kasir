<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS-kasir - Transaksi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/style.css">

<style>

body{

    background:#f4f6f9;

}

/* ===========================
   NAVBAR
=========================== */

.navbar{

    box-shadow:0 3px 12px rgba(0,0,0,.12);

}

.navbar-brand{

    font-weight:700;
    letter-spacing:.5px;

}

/* ===========================
   CARD
=========================== */

.card{

    border:none;
    border-radius:18px;

    box-shadow:0 4px 14px rgba(0,0,0,.08);

}

.card-title{

    font-weight:700;

}

/* ===========================
   PRODUK
=========================== */

.produk-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(190px,1fr));

    gap:18px;

}

.produk-card{

    background:#fff;

    border-radius:16px;

    overflow:hidden;

    transition:.2s;

    border:1px solid #ececec;

}

.produk-card:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 18px rgba(0,0,0,.12);

}

.produk-img{

    width:100%;

    height:150px;

    object-fit:cover;

    background:#f1f1f1;

}

.produk-body{

    padding:15px;

}

.produk-nama{

    font-weight:700;

    min-height:48px;

}

.produk-harga{

    color:#198754;

    font-size:18px;

    font-weight:bold;

    margin-top:8px;

}

.produk-stok{

    color:#777;

    font-size:13px;

    margin-bottom:12px;

}

.btn-tambah{

    width:100%;

    border-radius:10px;

}

/* ===========================
   KERANJANG
=========================== */

#keranjang{

    max-height:420px;

    overflow-y:auto;

    padding-right:4px;

}

#keranjang::-webkit-scrollbar{

    width:6px;

}

#keranjang::-webkit-scrollbar-thumb{

    background:#d0d0d0;

    border-radius:10px;

}

.item-cart{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:#fafafa;

    border-radius:12px;

    padding:12px;

    margin-bottom:12px;

    border:1px solid #eee;

}

.item-info{

    flex:1;

    min-width:0;

}

.item-nama{

    font-weight:bold;

    word-break:break-word;

}

.item-harga{

    color:#777;

    font-size:13px;

}

.qty-box{

    display:flex;

    align-items:center;

    gap:8px;

}

.qty-btn{

    width:34px;

    height:34px;

    border:none;

    border-radius:8px;

    background:#198754;

    color:#fff;

    font-weight:bold;

}

.qty-value{

    min-width:24px;

    text-align:center;

    font-weight:bold;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a
href="../index.html"
class="btn btn-outline-light">

<i class="bi bi-house"></i>
Dashboard

</a>

<span class="navbar-brand mx-auto">

🛒 PS-kasir

</span>

</div>

</nav>

<div class="container py-4">

<div class="row g-4">

<!-- ================================= -->
<!-- DAFTAR BARANG -->
<!-- ================================= -->

<div class="col-lg-8">

<div class="card h-100">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="card-title m-0">

📦 Daftar Barang

</h4>

<span class="badge bg-success">

Klik barang untuk menambahkan

</span>

</div>

<div id="daftarBarang" class="produk-grid">

<!-- Diisi transaksi.js -->

</div>

</div>

</div>

</div>

<!-- ================================= -->
<!-- KERANJANG -->
<!-- ================================= -->

<div class="col-lg-4">

<div class="card">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-3">

<h4 class="card-title m-0">

🧾 Keranjang

</h4>

<span
id="jumlahItem"
class="badge bg-primary">

0 Item

</span>

</div>

<div id="keranjang">

<!-- Diisi transaksi.js -->

</div>

<hr>

<div class="d-flex justify-content-between align-items-center">

<span class="fw-bold">

Total Belanja

</span>

<h3
id="totalBelanja"
class="text-success m-0">

Rp0

</h3>

</div>

<div class="mt-4">

<label class="form-label fw-semibold">

💵 Bayar Tunai

</label>

<input
id="bayar"
type="number"
class="form-control form-control-lg"
placeholder="Masukkan uang pembayaran">

</div>

<div class="mt-4 d-flex justify-content-between align-items-center">

<span class="fw-bold">

Kembalian

</span>

<h3
id="kembalian"
class="text-primary m-0">

Rp0

</h3>

</div>

<button
id="previewBtn"
class="btn btn-success btn-lg w-100 mt-4">

<i class="bi bi-printer"></i>

Preview & Cetak Struk

</button>

</div>

</div>

<div class="card mt-3">

<div class="card-body text-center">

<small class="text-muted">

PS-kasir siap digunakan
untuk printer thermal
58 mm maupun 80 mm.

</small>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script type="module" src="../assets/js/transaksi.js"></script>

</body>

</html>
