<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Transaksi Kasir</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="../index.html" class="navbar-brand">

☕ KasirKu POS

</a>

</div>

</nav>

<div class="container mt-4">

<div class="row g-4">

    <!-- DAFTAR BARANG -->
    <div class="col-lg-8">

        <div class="card shadow-sm border-0 h-100">

            <div class="card-body">

                <h4 class="mb-3">
                    🛒 Daftar Barang
                </h4>

                <div id="daftarBarang" class="produk-grid"></div>

            </div>

        </div>

    </div>

    <!-- KERANJANG -->
    <div class="col-lg-4">

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <h4 class="mb-3">
                    🧾 Keranjang
                </h4>

                <div id="keranjang"></div>

                <hr>

                <div class="d-flex justify-content-between">

                    <span>Total</span>

                    <h3 id="totalBelanja">Rp0</h3>

                </div>

                <div class="mt-3">

                    <label>Bayar Tunai</label>

                    <input
                        id="bayar"
                        type="number"
                        class="form-control"
                        placeholder="Masukkan uang">

                </div>

                <div class="mt-3 d-flex justify-content-between">

                    <span>Kembalian</span>

                    <h3 id="kembalian">Rp0</h3>

                </div>

                <button
                    id="previewBtn"
                    class="btn btn-success w-100 mt-3">

                    Preview Struk

                </button>

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.js"></script>

<script type="module" src="../assets/js/transaksi.js"></script>

</body>

</html>
